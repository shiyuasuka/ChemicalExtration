# Domain rules for KnowMat 2.0 G4 Ligand extraction.
# biochemistry / chemistry domain rules — edit this file to adjust
# extraction heuristics without modifying Python code.

# ---------------------------------------------------------------------------
# Ligand ID patterns
# ---------------------------------------------------------------------------

# G4 ligand IDs follow the G4Lxxxx pattern (e.g., G4L0065, G4L0140).
# This list is used to validate / auto-assign ligand IDs.
