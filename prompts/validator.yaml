validation_tail: |
  ════════════════════════════════════════════════════════════════════════════════
  BEGIN VALIDATION:
  ════════════════════════════════════════════════════════════════════════════════

  Review the aggregated data against the evaluation feedback below.
  Apply hallucination corrections where the feedback indicates the fix.
  Ensure all measurements preserve their raw value strings correctly.
  Return the validated data with any necessary corrections.

  In your aggregation_rationale, explain:
  - What corrections you applied (with justification from evaluation feedback)
  - What data you verified as correct
  - Any remaining uncertainties or edge cases

  In your human_review_guide, provide:
  - Numbered list of specific items to verify
  - Focus on corrected hallucinations, unusual values, or ambiguous data
  - Be specific: mention ligand names, sequence names/sequences, measurement
    values, and methods with evidence hints
  - Each item MUST include an evidence_hint (short pointer like:
    "Table 2 row X col Y", "Caption of Fig.3", or nearest phrase)
  - Use the smallest verifiable unit:
    ligand_name + sequence_name_or_sequence + value + method + evidence_hint

  Use the tool to provide your validated output.
  ════════════════════════════════════════════════════════════════════════════════
